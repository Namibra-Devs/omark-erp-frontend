[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Proxies API calls through this same origin so the browser never has to
# make a cross-origin request to api.erp.omarkrealestate.com — sidesteps
# the backend's CORS allow-list (currently only permits localhost:3000)
# without needing any change on the backend. Must come before the SPA
# catch-all below, since Netlify uses the first matching rule.
[[redirects]]
  from = "/api/*"
  to = "https://api.erp.omarkrealestate.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
